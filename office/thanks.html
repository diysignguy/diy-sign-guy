<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Received — Thank You | DIY Sign Guy</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--blue:#2f95ff;--blue-deep:#1673e6;--orange:#ff9130;--gold:#ffc24d;--red:#ff5252;--muted:#9aa6b5;--line:#20242b;--glow:rgba(47,149,255,.4);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',system-ui,Arial,sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;line-height:1.65;}
  .wrap{max-width:560px;}
  h1{font-family:'Barlow Condensed',Arial,sans-serif;font-size:clamp(2rem,6vw,3rem);line-height:1.05;margin:18px 0 12px;}
  .tri .c1{color:var(--orange);} .tri .c2{color:var(--blue);text-shadow:0 0 24px var(--glow);} .tri .c3{color:var(--red);}
  .check{width:74px;height:74px;border-radius:50%;background:linear-gradient(160deg,var(--blue),var(--blue-deep));display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto;box-shadow:0 0 30px var(--glow);}
  p{color:var(--muted);margin-bottom:12px;}
  .btn{display:inline-block;margin-top:16px;background:linear-gradient(160deg,var(--blue),var(--blue-deep));color:#fff;font-weight:700;padding:13px 26px;border-radius:11px;text-decoration:none;box-shadow:0 6px 20px var(--glow);}
</style>
</head>
<body>
<div class="wrap">
  <div class="check">&#10003;</div>
  <h1>Got It — <span style="color:var(--gold);">Thank You!</span></h1>
  <p>Your submission went straight to Dean. Check your email — a confirmation copy is on its way, and Dean will follow up personally with your next step.</p>
  <p class="tri" style="font-family:'Barlow Condensed',Arial,sans-serif;font-size:1.3rem;"><b class="c1">DIY</b> <b class="c2">SIGN</b> <b class="c3">GUY.COM</b></p>
  <a class="btn" href="https://diysignguy.com">Back to the Site</a>
</div>
</body>
</html>
